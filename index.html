<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>期权动态加仓记录器 v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%); min-height: 100vh; padding: 12px; color: #334155; font-size: 16px; }
        .container { max-width: 100%; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 24px; color: #475569; font-weight: 700; }
        .day-card { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-left: 5px solid #64748b; }
        .day-card.day1 { border-left-color: #059669; }
        .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .day-title { font-size: 17px; font-weight: 700; color: #475569; }
        .day-card.day1 .day-title { color: #059669; }
        .day-status { font-size: 12px; padding: 5px 12px; border-radius: 20px; background: #e2e8f0; color: #64748b; font-weight: 600; }
        .day-status.completed { background: #059669; color: #fff; }
        .input-grid { display: grid; grid-template-columns: 1fr; gap: 14px; margin-bottom: 14px; }
        @media (min-width: 640px) {
            .input-grid { grid-template-columns: repeat(2, 1fr); }
            body { padding: 20px; }
            h1 { font-size: 24px; }
        }
        @media (min-width: 768px) {
            .input-grid { grid-template-columns: repeat(3, 1fr); }
            .container { max-width: 900px; }
        }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 14px; color: #64748b; margin-bottom: 6px; font-weight: 600; }
        .input-group input, .input-group select { padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; background: #f8fafc; color: #1e293b; font-size: 16px; min-height: 48px; transition: all 0.2s; }
        .input-group input:disabled, .input-group select:disabled { opacity: 0.6; cursor: not-allowed; background: #e2e8f0; border-color: #cbd5e1; }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #667eea; background: #fff; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn { width: 100%; padding: 16px; background: #475569; border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; min-height: 52px; touch-action: manipulation; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; background: #94a3b8; box-shadow: none; }
        .btn-record { background: #059669; }
        .btn-rerecord { background: #d97706; }
        .btn-reset { background: #64748b; }
        .result-box { background: linear-gradient(135deg, #f8fafc, #e0e7ff); border-radius: 12px; padding: 16px; margin-top: 16px; overflow-x: auto; border: 1px solid #e2e8f0; }
        .result-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #e2e8f0; font-size: 15px; }
        .result-row:last-child { border-bottom: none; }
        .result-label { color: #64748b; font-weight: 500; }
        .result-value { font-weight: 700; color: #1e293b; }
        .result-value.highlight { color: #475569; font-size: 18px; }
        .result-value.profit { color: #10b981; }
        .result-value.warning { color: #ef4444; }
        .summary-card { background: #fff; border-radius: 16px; padding: 18px; margin-top: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .summary-title { font-size: 16px; margin-bottom: 14px; color: #475569; font-weight: 700; }
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .summary-item { text-align: center; padding: 14px 8px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        .summary-label { font-size: 11px; color: #64748b; margin-bottom: 6px; font-weight: 600; }
        .summary-value { font-size: 17px; font-weight: 700; color: #475569; }
        .hidden { display: none !important; }
        .actions { display: flex; gap: 12px; margin-top: 20px; justify-content: center; }
        .btn-reset { background: linear-gradient(90deg, #64748b, #475569); }
        .btn-rerecord { background: linear-gradient(90deg, #f59e0b, #d97706); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }
        .global-settings { background: #fff; border: 2px solid #94a3b8; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .day-actions { display: flex; gap: 10px; margin-top: 14px; }
        .day-actions .btn { margin-top: 0; }
        .cost-display { background: #f8fafc; padding: 16px; border-radius: 12px; margin-top: 14px; font-size: 15px; text-align: center; border: 2px solid #e2e8f0; }
        .cost-display span { color: #059669; font-weight: 700; font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 期权动态加仓记录器</h1>
        
        <div class="day-card global-settings" id="globalSettings">
            <div class="day-header">
                <span class="day-title">⚙️ 全局设置</span>
            </div>
            <div class="input-grid">
                <div class="input-group">
                    <label>总资金 (元)</label>
                    <input type="number" id="totalFunds" value="100000" step="1000">
                </div>
                <div class="input-group">
                    <label>计划投注天数</label>
                    <input type="number" id="planDays" value="7" step="1" min="2" max="30" onchange="updatePlanDays()">
                </div>
            </div>
            <button class="btn" onclick="initDays()">开始计划</button>
        </div>
        
        <div id="daysContainer"></div>
        
        <div class="summary-card hidden" id="summaryCard">
            <div class="summary-title">📈 总体持仓情况</div>
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="summary-label">总持仓手数</div>
                    <div class="summary-value" id="totalHands">-</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">总投入成本</div>
                    <div class="summary-value" id="totalCost">-</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">平均成本</div>
                    <div class="summary-value" id="avgCost">-</div>
                </div>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn btn-reset" onclick="resetAll()">重置所有</button>
        </div>
    </div>

    <script>
        const days = [];
        let maxDays = 7;
        let contractSize = 1;
        
        function updatePlanDays() {
            maxDays = parseInt(document.getElementById('planDays').value) || 7;
        }
        
        function initDays() {
            document.getElementById('globalSettings').style.display = 'none';
            const container = document.getElementById('daysContainer');
            container.innerHTML = '';
            days.length = 0;
            
            for (let i = 1; i <= maxDays; i++) {
                days.push({
                    day: i,
                    completed: false,
                    holdHands: 0,
                    holdCost: 0,
                    currentPrice: 0,
                    targetRise: 50,
                    profitRate: 30,
                    mode: 'breakeven',
                    addHands: 0,
                    addCost: 0,
                    totalHands: 0,
                    totalCost: 0,
                    avgCost: 0,
                    targetPrice: 0
                });
                
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card' + (i === 1 ? ' day1' : '');
                dayCard.id = `dayCard${i}`;
                
                if (i === 1) {
                    dayCard.innerHTML = `
                        <div class="day-header">
                            <span class="day-title">第 1 天 - 首次买入</span>
                            <span class="day-status" id="status${i}">待记录</span>
                        </div>
                        <div class="input-grid">
                            <div class="input-group">
                                <label>合约系数</label>
                                <input type="number" id="contractSize" value="1" step="1" min="1" onchange="updateContractSize()">
                            </div>
                            <div class="input-group">
                                <label>买入价格 (元)</label>
                                <input type="number" id="price${i}" value="1058" step="1">
                            </div>
                            <div class="input-group">
                                <label>买入手数</label>
                                <input type="number" id="hands${i}" value="1" step="1" onchange="updateDay1Cost()">
                            </div>
                            <div class="input-group">
                                <label>预期涨幅 (%)</label>
                                <input type="number" id="rise${i}" value="50" step="1">
                            </div>
                        </div>
                        <div class="cost-display">
                            预计投入: <span id="day1Cost">1058</span> 元
                        </div>
                        <div class="day-actions">
                            <button class="btn btn-record" id="btn${i}" onclick="recordDay1()">记录买入</button>
                            <button class="btn btn-rerecord hidden" id="rerun${i}" onclick="rerunDay(1)">重新记录</button>
                        </div>
                        <div id="result${i}" class="result-box hidden"></div>
                    `;
                } else {
                    dayCard.innerHTML = `
                        <div class="day-header">
                            <span class="day-title">第 ${i} 天</span>
                            <span class="day-status" id="status${i}">待记录</span>
                        </div>
                        <div class="input-grid">
                            <div class="input-group">
                                <label>当前价格 (元)</label>
                                <input type="number" id="price${i}" step="1" placeholder="输入收盘价">
                            </div>
                            <div class="input-group">
                                <label>计算模式</label>
                                <select id="mode${i}">
                                    <option value="breakeven">保本模式</option>
                                    <option value="profit">盈利模式</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>预期涨幅 (%)</label>
                                <input type="number" id="rise${i}" value="50" step="1">
                            </div>
                            <div class="input-group" id="profitGroup${i}">
                                <label>目标盈利率 (%)</label>
                                <input type="number" id="profit${i}" value="30" step="1">
                            </div>
                        </div>
                        <div class="day-actions">
                            <button class="btn" id="btn${i}" onclick="calculateDay(${i})">计算加仓</button>
                            <button class="btn btn-rerecord hidden" id="rerun${i}" onclick="rerunDay(${i})">重新记录</button>
                        </div>
                        <div id="result${i}" class="result-box hidden"></div>
                    `;
                }
                container.appendChild(dayCard);
                
                if (i > 1) {
                    document.getElementById(`mode${i}`).addEventListener('change', function() {
                        const group = document.getElementById(`profitGroup${i}`);
                        group.style.opacity = this.value === 'breakeven' ? '0.3' : '1';
                    });
                    document.getElementById(`profitGroup${i}`).style.opacity = '0.3';
                }
            }
            
            updateDayStatus();
        }
        
        function updateContractSize() {
            contractSize = parseFloat(document.getElementById('contractSize').value) || 1;
            updateDay1Cost();
        }
        
        function updateDay1Cost() {
            const price = parseFloat(document.getElementById('price1').value) || 0;
            const hands = parseFloat(document.getElementById('hands1').value) || 0;
            const cost = price * hands * contractSize;
            document.getElementById('day1Cost').textContent = cost.toFixed(0);
        }
        
        function recordDay1() {
            const day = days[0];
            
            day.currentPrice = parseFloat(document.getElementById('price1').value) || 0;
            day.holdHands = 0;
            day.holdCost = 0;
            day.addHands = parseFloat(document.getElementById('hands1').value) || 1;
            day.targetRise = parseFloat(document.getElementById('rise1').value) / 100 || 0;
            
            if (!day.currentPrice) {
                alert('请输入买入价格');
                return;
            }
            
            day.addCost = day.addHands * day.currentPrice * contractSize;
            day.totalHands = day.addHands;
            day.totalCost = day.addCost;
            day.avgCost = day.currentPrice;
            day.targetPrice = day.currentPrice * (1 + day.targetRise);
            day.completed = true;
            
            const resultDiv = document.getElementById('result1');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `
                <div class="result-row">
                    <span class="result-label">合约系数</span>
                    <span class="result-value">${contractSize}</span>
                </div>
                <div class="result-row">
                    <span class="result-label">买入手数</span>
                    <span class="result-value highlight">${day.addHands} 手</span>
                </div>
                <div class="result-row">
                    <span class="result-label">买入价格</span>
                    <span class="result-value">${day.currentPrice.toFixed(2)} 元</span>
                </div>
                <div class="result-row">
                    <span class="result-label">实际投入</span>
                    <span class="result-value">${day.addCost.toFixed(0)} 元</span>
                </div>
                <div class="result-row">
                    <span class="result-label">目标平仓价</span>
                    <span class="result-value profit">${day.targetPrice.toFixed(2)} 元</span>
                </div>
                <div class="result-row" style="border-top: 2px solid #38bdf8; margin-top: 8px; padding-top: 12px;">
                    <span class="result-label">资金仓位占用</span>
                    <span class="result-value ${day.totalCost / getTotalFunds() > 0.8 ? 'warning' : 'highlight'}">${(day.totalCost / getTotalFunds() * 100).toFixed(1)}%</span>
                </div>
            `;
            
            updateDayStatus();
        }
        
        function getTotalFunds() {
            return parseFloat(document.getElementById('totalFunds').value) || 100000;
        }
        
        function updateDayStatus() {
            for (let i = 0; i < days.length; i++) {
                const day = days[i];
                const statusEl = document.getElementById(`status${day.day}`);
                const btn = document.getElementById(`btn${day.day}`);
                
                const prevCompleted = i === 0 || days[i-1].completed;
                
                if (!prevCompleted) {
                    btn.disabled = true;
                    statusEl.textContent = '请先完成前一天';
                    if (day.day > 1) {
                        document.getElementById(`price${day.day}`).disabled = true;
                        document.getElementById(`mode${day.day}`).disabled = true;
                        document.getElementById(`rise${day.day}`).disabled = true;
                        document.getElementById(`profit${day.day}`).disabled = true;
                    }
                } else if (day.completed) {
                    statusEl.textContent = '已完成';
                    statusEl.classList.add('completed');
                    btn.disabled = true;
                    btn.textContent = day.day === 1 ? '已记录' : '已计算';
                    // 显示重新记录按钮
                    const rerunBtn = document.getElementById(`rerun${day.day}`);
                    if (rerunBtn) rerunBtn.classList.remove('hidden');
                    
                    if (day.day === 1) {
                        document.getElementById('contractSize').disabled = true;
                        document.getElementById('price1').disabled = true;
                        document.getElementById('hands1').disabled = true;
                        document.getElementById('rise1').disabled = true;
                    } else {
                        document.getElementById(`price${day.day}`).disabled = true;
                        document.getElementById(`mode${day.day}`).disabled = true;
                        document.getElementById(`rise${day.day}`).disabled = true;
                        document.getElementById(`profit${day.day}`).disabled = true;
                    }
                } else {
                    statusEl.textContent = '待记录';
                    btn.disabled = false;
                    if (day.day === 1) {
                        document.getElementById('contractSize').disabled = false;
                        document.getElementById('price1').disabled = false;
                        document.getElementById('hands1').disabled = false;
                        document.getElementById('rise1').disabled = false;
                    } else {
                        document.getElementById(`price${day.day}`).disabled = false;
                        document.getElementById(`mode${day.day}`).disabled = false;
                        document.getElementById(`rise${day.day}`).disabled = false;
                        document.getElementById(`profit${day.day}`).disabled = false;
                    }
                }
            }
            
            updateSummary();
        }
        
        function calculateDay(dayNum) {
            const day = days[dayNum - 1];
            
            day.currentPrice = parseFloat(document.getElementById(`price${dayNum}`).value) || 0;
            day.mode = document.getElementById(`mode${dayNum}`).value;
            day.targetRise = parseFloat(document.getElementById(`rise${dayNum}`).value) / 100 || 0;
            day.profitRate = parseFloat(document.getElementById(`profit${dayNum}`).value) / 100 || 0;
            
            if (!day.currentPrice) {
                alert('请输入当前价格');
                return;
            }
            
            const prevDay = days[dayNum - 2];
            day.holdHands = prevDay.totalHands;
            day.holdCost = prevDay.avgCost;
            
            const targetPrice = day.currentPrice * (1 + day.targetRise);
            const holdTotalCost = day.holdHands * day.holdCost * contractSize;
            
            let addHands;
            if (day.mode === 'breakeven') {
                const numerator = holdTotalCost - day.holdHands * targetPrice * contractSize;
                const denominator = (targetPrice - day.currentPrice) * contractSize;
                addHands = denominator > 0 ? numerator / denominator : 0;
            } else {
                const numerator = holdTotalCost * (1 + day.profitRate) - day.holdHands * targetPrice * contractSize;
                const denominator = (targetPrice - day.currentPrice * (1 + day.profitRate)) * contractSize;
                addHands = denominator > 0 ? numerator / denominator : 0;
            }
            
            day.addHands = Math.ceil(Math.max(0, addHands));
            day.addCost = day.addHands * day.currentPrice * contractSize;
            
            day.totalHands = day.holdHands + day.addHands;
            day.totalCost = (day.holdHands * day.holdCost * contractSize) + day.addCost;
            day.avgCost = day.totalCost / (day.totalHands * contractSize);
            day.targetPrice = targetPrice;
            day.completed = true;
            
            const resultDiv = document.getElementById(`result${dayNum}`);
            resultDiv.classList.remove('hidden');
            
            const modeText = day.mode === 'breakeven' ? '保本' : `盈利${(day.profitRate*100).toFixed(0)}%`;
            
            resultDiv.innerHTML = `
                <div class="result-row">
                    <span class="result-label">昨日持仓</span>
                    <span class="result-value">${day.holdHands} 手 @ ${day.holdCost?.toFixed(2) || '-'} 元</span>
                </div>
                <div class="result-row">
                    <span class="result-label">今日加仓</span>
                    <span class="result-value highlight">${day.addHands} 手 @ ${day.currentPrice.toFixed(2)} 元</span>
                </div>
                <div class="result-row">
                    <span class="result-label">今日花费</span>
                    <span class="result-value">${day.addCost.toFixed(0)} 元</span>
                </div>
                <div class="result-row">
                    <span class="result-label">累计持仓</span>
                    <span class="result-value">${day.totalHands} 手</span>
                </div>
                <div class="result-row">
                    <span class="result-label">累计成本</span>
                    <span class="result-value">${day.totalCost.toFixed(0)} 元</span>
                </div>
                <div class="result-row">
                    <span class="result-label">平均成本</span>
                    <span class="result-value">${day.avgCost.toFixed(2)} 元</span>
                </div>
                <div class="result-row">
                    <span class="result-label">目标平仓价</span>
                    <span class="result-value profit">${day.targetPrice.toFixed(2)} 元</span>
                </div>
                <div class="result-row">
                    <span class="result-label">平仓后${modeText}</span>
                    <span class="result-value profit">收入 ${(day.totalHands * day.targetPrice * contractSize).toFixed(0)} 元</span>
                </div>
                <div class="result-row" style="border-top: 2px solid #38bdf8; margin-top: 8px; padding-top: 12px;">
                    <span class="result-label">资金仓位占用</span>
                    <span class="result-value ${day.totalCost / getTotalFunds() > 0.8 ? 'warning' : 'highlight'}">${(day.totalCost / getTotalFunds() * 100).toFixed(1)}%</span>
                </div>
            `;
            
            updateDayStatus();
        }
        
        function updateSummary() {
            const completedDays = days.filter(d => d.completed);
            if (completedDays.length === 0) {
                document.getElementById('summaryCard').classList.add('hidden');
                return;
            }
            
            const lastDay = completedDays[completedDays.length - 1];
            document.getElementById('totalHands').textContent = lastDay.totalHands + ' 手';
            document.getElementById('totalCost').textContent = lastDay.totalCost.toFixed(0) + ' 元';
            document.getElementById('avgCost').textContent = lastDay.avgCost.toFixed(2) + ' 元';
            document.getElementById('summaryCard').classList.remove('hidden');
        }
        
        function rerunDay(dayNum) {
            if (!confirm(`确定要重新记录第${dayNum}天吗？这将清除当天及之后的所有记录。`)) {
                return;
            }
            
            // 清除当天及之后的记录
            for (let i = dayNum - 1; i < days.length; i++) {
                days[i].completed = false;
                days[i].holdHands = 0;
                days[i].holdCost = 0;
                days[i].addHands = 0;
                days[i].addCost = 0;
                days[i].totalHands = 0;
                days[i].totalCost = 0;
                days[i].avgCost = 0;
                days[i].targetPrice = 0;
            }
            
            // 恢复当天的hold数据（基于前一天）
            if (dayNum > 1 && days[dayNum - 2].completed) {
                const prevDay = days[dayNum - 2];
                days[dayNum - 1].holdHands = prevDay.totalHands;
                days[dayNum - 1].holdCost = prevDay.avgCost;
            }
            
            // 隐藏结果和重新记录按钮
            document.getElementById(`result${dayNum}`).classList.add('hidden');
            const rerunBtn = document.getElementById(`rerun${dayNum}`);
            if (rerunBtn) rerunBtn.classList.add('hidden');
            
            updateDayStatus();
        }
        
        function resetAll() {
            if (confirm('确定要重置所有记录吗？')) {
                contractSize = 1;
                document.getElementById('globalSettings').style.display = 'block';
                document.getElementById('daysContainer').innerHTML = '';
                days.length = 0;
                document.getElementById('summaryCard').classList.add('hidden');
            }
        }
        
        // 页面加载时不初始化天数，等待用户点击"开始计划"
        document.getElementById('globalSettings').style.display = 'block';
    </script>
</body>
</html>
